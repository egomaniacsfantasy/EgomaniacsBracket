name: Rebuild TypeScript data files

on:
  push:
    branches: [main]
    paths:
      - "*.xlsx"

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate TypeScript data files
        run: npx tsx scripts/convertData.ts

      - name: Commit regenerated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            src/lib/matchupProbData.ts \
            src/data/bracketPreds2026.ts \
            src/conferences/data/confTeams.ts \
            src/conferences/data/confMatchupProbs.ts \
            src/rankings/data/d1Rankings.ts
          git diff --staged --quiet || git commit -m "Auto-regenerate TypeScript data files [skip ci]"
          git push
