  </text>

  <text x="512" y="790" text-anchor="middle" fill="#D9C79F" fill-opacity="0.72" font-family="'Space Grotesk', 'Avenir Next', sans-serif" font-size="30" letter-spacing="0.08em">
    BRACKET ODDS LAB
