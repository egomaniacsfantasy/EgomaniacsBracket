services:
  - type: web
    name: odds-gods-bracket
    env: static
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
