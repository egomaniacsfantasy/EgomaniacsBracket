services:
  - type: web
    name: odds-gods-bracket
    env: static
    branch: main
    autoDeployTrigger: commit
    buildCommand: echo "RENDER_DIAG_SHA=$(git rev-parse HEAD)" && echo "RENDER_DIAG_BRANCH=$(git branch --show-current)" && npm install && npm run build && echo "RENDER_DIAG_BUNDLE=$(grep -o 'src="[^"]*\.js"' dist/index.html)"
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
